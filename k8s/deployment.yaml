apiVersion: apps/v1
kind: Deployment
metadata:
  name: urlshrink
  labels:
    app: urlshrink
spec:
  replicas: 3
  selector:
    matchLabels:
      app: urlshrink
  template:
    metadata:
      labels:
        app: urlshrink
    spec:
      containers:
      - name: urlshrink
        image: <ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com/urlshrink:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: django-config
        - secretRef:
            name: django-secret
        env: # Additional environment variables not in ConfigMap/Secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
      imagePullSecrets:
      - name: ecr-secret
